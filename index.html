<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap">
    <link rel="stylesheet" href="./style.css">
    <title>Todo List</title>
</head>
<body id="container">
    <header id="header">
        <nav id="toolbar">
            <button class="new-project option">
                <div class="add-project icon"></div>
                <h3>New Project</h3>
            </button>
            <button class="sort-todos option">
                <div class="sort icon"></div>
                <h3>Sort</h3>
            </button>
            <button class="search icon"></button>
            <input id="searchbar">
        </nav>
        <nav id="sort-menu" class="hidden">
            <button class="sort-alpha"></button>
            <button class="sort-date"></button>
            <button class="sort-priority"></button>
            <button class="sort-completed"></button>
            <input type="checkbox" id="sort-reverse">
            <button class="close">x</button>
        </nav>
    </header>
    <div id="sidebar"></div>
    <div id="content">
        <div id="project-header"></div>
        <div id="todo-container"></div>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
